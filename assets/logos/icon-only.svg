<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img">
  <defs>
    <radialGradient id="gradStale" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FF7A3D" />
      <stop offset="70%" stop-color="#F46623" />
      <stop offset="100%" stop-color="#C23B0A" />
    </radialGradient>
    <linearGradient id="gradFetching" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="gradActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <style>
      .stale { fill: url(#gradStale); }
      .fetching { fill: none; stroke: url(#gradFetching); stroke-width: 5; stroke-dasharray: 7 5; }
      .active { fill: url(#gradActive); }
    </style>
  </defs>
  <!-- Scaled to match horizontal layout proportions exactly -->
  <circle class="stale" cx="32" cy="32" r="20" />
  <circle class="fetching" cx="64" cy="32" r="20" />
  <circle class="active" cx="48" cy="56" r="20" />
</svg>
